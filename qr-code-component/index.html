<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/globals.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <section class="qr-code">
        <img class="qr-code__image" src="images/image-qr-code.png" alt="QR Code linking to Frontend Mentor">
        <article class="qr-code__details">
            <h1 class="qr-code__title">Improve your front-end skills by building projects</h1>
            <p class="qr-code__description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </article>
    </section>
</body>
</html>
