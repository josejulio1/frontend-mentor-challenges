<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator App</title>
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/globals.css">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <section class="age-calculator">
        <section class="age-calculator__fields">
            <article class="fields__item">
                <label for="year">Year</label>
                <input type="number" placeholder="YYYY" id="year" min="1">
                <p class="item__error">Must be in the past</p>
            </article>
            <article class="fields__item">
                <label for="month">Month</label>
                <input type="number" placeholder="MM" id="month" min="1" max="12">
                <p class="item__error">Must be a valid month</p>
            </article>
            <article class="fields__item">
                <label for="day">Day</label>
                <input type="number" placeholder="DD" id="day" min="1" max="31">
                <p class="item__error">Must be a valid day</p>
            </article>
        </section>
        <section class="age-calculator__divider">
            <div class="divider__line"></div>
            <div class="divider__circle">
                <img src="images/icon-arrow.svg" alt="Arrow Icon">
            </div>
        </section>
        <section class="age-calculator__results">
            <article class="results__item">
                <span class="item__span" id="year-result">- -</span>
                <span class="item__text">years</span>
            </article>
            <article class="results__item">
                <span class="item__span" id="month-result">- -</span>
                <span class="item__text">months</span>
            </article>
            <article class="results__item">
                <span class="item__span" id="day-result">- -</span>
                <span class="item__text">days</span>
            </article>
        </section>
    </section>
</body>
</html>
